<html>
  <head>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0px;
      }
      body {
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        font-size: 11px;
        color: #1a1a1a;
        background: #fff;
        padding: 0px;
      }
      @media print {
        * {
          -webkit-print-color-adjust: exact;
          print-color-adjust: exact;
        }
        @page {
          margin: 0;
          padding: 0;
        }
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        padding-bottom: 32px;
        border-bottom: 2px solid #1a1a1a;
        margin-bottom: 40px;
      }
      .sender-name {
        font-size: 20px;
        font-weight: 700;
        letter-spacing: -0.5px;
        color: #1a1a1a;
      }
      .sender-details {
        font-size: 10px;
        color: #666;
        line-height: 1.7;
        text-align: right;
      }

      .invoice-meta {
        display: flex;
        justify-content: space-between;
        margin-bottom: 40px;
      }
      .bill-to-label {
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: #999;
        margin-bottom: 6px;
      }
      .bill-to-name {
        font-size: 14px;
        font-weight: 600;
        color: #1a1a1a;
      }
      .meta-grid {
        text-align: right;
      }
      .meta-row {
        display: flex;
        justify-content: flex-end;
        gap: 24px;
        margin-bottom: 4px;
        font-size: 10px;
      }
      .meta-label {
        color: #999;
        min-width: 80px;
        text-align: right;
      }
      .meta-value {
        color: #1a1a1a;
        font-weight: 500;
        min-width: 100px;
        text-align: right;
      }

      .invoice-badge {
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: #999;
        margin-bottom: 32px;
      }

      .line-items {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 0;
      }
      .line-items thead th {
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: #999;
        border-bottom: 1px solid #e0e0e0;
        padding: 0 0 10px 0;
        text-align: left;
      }
      .line-items thead th:last-child {
        text-align: right;
      }
      .line-items tbody td {
        padding: 18px 0;
        border-bottom: 1px solid #f0f0f0;
        vertical-align: top;
        font-size: 11px;
      }
      .line-items tbody td:last-child {
        text-align: right;
        font-weight: 600;
      }
      .item-description {
        font-weight: 600;
        margin-bottom: 3px;
        color: #1a1a1a;
      }
      .item-sub {
        color: #888;
        font-size: 10px;
      }

      .totals {
        display: flex;
        justify-content: flex-end;
        margin-top: 24px;
      }
      .totals-table {
        width: 260px;
      }
      .totals-row {
        display: flex;
        justify-content: space-between;
        font-size: 10px;
        color: #666;
        margin-bottom: 6px;
      }
      .totals-row.total {
        font-size: 14px;
        font-weight: 700;
        color: #1a1a1a;
        border-top: 2px solid #1a1a1a;
        padding-top: 10px;
        margin-top: 4px;
      }
    </style>
  </head>
  <body>
    <div style="padding: 30px">
      <div class="invoice-badge">Invoice</div>

      <div class="header">
        <div class="sender-name">{SENDER_NAME}</div>
        <div class="sender-details">
          {SENDER_ADDRESS}<br />
          {SENDER_CITY_STATE_ZIP}<br />
          {SENDER_EMAIL}<br />
          {SENDER_PHONE}
        </div>
      </div>

      <div class="invoice-meta">
        <div>
          <div class="bill-to-label">Bill to</div>
          <div class="bill-to-name">{CLIENT_NAME}</div>
        </div>
        <div class="meta-grid">
          <div class="meta-row">
            <span class="meta-label">Invoice no.</span>
            <span class="meta-value">{INVOICE_NO}</span>
          </div>
          <div class="meta-row">
            <span class="meta-label">Date</span>
            <span class="meta-value">{INVOICE_DATE}</span>
          </div>
          <div class="meta-row">
            <span class="meta-label">Due</span>
            <span class="meta-value">{DUE_DATE}</span>
          </div>
        </div>
      </div>

      <table class="line-items">
        <thead>
          <tr>
            <th>Description</th>
            <th>Rate</th>
            <th>Hours</th>
            <th>Amount</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>
              <div class="item-description">{DESCRIPTION}</div>
              <div class="item-sub">{FROM_TO}</div>
            </td>
            <td>{HOURLY_RATE}</td>
            <td>{HOURS}</td>
            <td>{AMOUNT}</td>
          </tr>
        </tbody>
      </table>

      <div class="totals">
        <div class="totals-table">
          <div class="totals-row total">
            <span>Total due</span>
            <span>{AMOUNT}</span>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
